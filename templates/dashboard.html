        // Gráfico Linhas vs Tipo de Intervenção

                zoomType: 'xy'  // Para permitir dois eixos Y
            },
            title: {
                text: 'Nº de Intervenções por Linha (Melhoria)'
            },
            xAxis: {
                categories: ['Linha 1', 'Linha 2', 'Linha 3', 'Linha 4'],  // Estas serão reordenadas de acordo com os dados
                crosshair: true
            },
            yAxis: [{
                title: {
                    text: 'Total de Intervenções'
                }
            }, {
                title: {
                    text: 'Percentagem Acumulada'
                },
                min: 0,
                max: 100,
                opposite: true
            }],
            tooltip: {
                shared: true
            },
            series: [{
                name: 'Intervenções',
                type: 'column',
                data: (function () {
                    var categories = ['Linha 1', 'Linha 2', 'Linha 3', 'Linha 4'];
                    var data = [10, 5, 15, 7];

                    // Ordena os dados do maior para o menor e reordena as categorias
                    var sortedData = data.map((value, index) => [categories[index], value])
                                        .sort((a, b) => b[1] - a[1]); // Ordena os dados

                    var sortedCategories = sortedData.map(item => item[0]);
                    // Não vamos usar Highcharts.charts[0] aqui porque isso pode causar problemas se o gráfico não estiver presente

                    // Retorna os valores ordenados
                    return sortedData.map(item => item[1]);
                })(),
                tooltip: {
                    valueSuffix: ' intervenções'
                }
            }, {
                name: 'Percentagem Acumulada',
                type: 'spline',
                data: (function () {
                    var data = [10, 5, 15, 7];

                    // Ordena os dados do maior para o menor
                    var sortedData = data.sort((a, b) => b - a);

                    // Calcula a percentagem acumulada
                    var total = sortedData.reduce((a, b) => a + b, 0);
                    var cumulative = 0;
                    return sortedData.map(value => {
                        cumulative += value;
                        var final = ((cumulative / total) * 100).toFixed(2);
                        return parseFloat(final);
                    });
                })(),

                tooltip: {
